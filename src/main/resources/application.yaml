spring:
  application:
    name: hrbank

  datasource:
    url: jdbc:postgresql://localhost:5432/onestep
    username: onestep
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

hrbank:
  infra:
    type: local
    local:
      root-path: ./storage